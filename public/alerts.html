<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#38BDF8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Set smart price alerts for your investments. Get notified when assets hit your target price.">

    <link rel="stylesheet" href="css/styles.css">
    <script src="/js/theme.js"></script>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <div class="app-shell">
        <!-- ── SIDEBAR ─────────────────────────────────── -->
        <aside class="sidebar" id="appSidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-mark">QV</div>
        <span class="sidebar-logo-text">QuantVault</span>
    </div>

    <nav class="sidebar-nav" aria-label="Main navigation">
        <span class="sidebar-section-label">Platform</span>
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span> Home
        </a>
        <a href="portfolio.html" class="nav-item">
            <span class="nav-icon">💼</span> Portfolio
        </a>
        <a href="transactions.html" class="nav-item">
            <span class="nav-icon">💰</span> Transactions
        </a>
        <a href="reports.html" class="nav-item">
            <span class="nav-icon">📈</span> Reports
        </a>
        <a href="watchlist.html" class="nav-item">
            <span class="nav-icon">👁️</span> Watchlist
        </a>
        <a href="alerts.html" class="nav-item active">
            <span class="nav-icon">🔔</span> Alerts
        </a>

        <div class="sidebar-divider"></div>

        <span class="sidebar-section-label">Account</span>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span> Profile
        </a>
        <a href="#" class="nav-item" onclick="logout(); return false;">
            <span class="nav-icon">🚪</span> Logout
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="sidebar-user">
            <img src="https://api.dicebear.com/9.x/adventurer/svg?seed=Nova" alt="Avatar" class="sidebar-avatar" id="sidebarAvatar">
            <div class="sidebar-user-info">
                <div class="sidebar-username" id="sidebarUsername">Loading...</div>
                <div class="sidebar-user-role">Investor</div>
            </div>
        </div>
    </div>
</aside>

        <!-- ── MAIN AREA ──────────────────────────────── -->
        <div class="main-area">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="topbar-menu-btn" id="menuBtn" aria-label="Toggle menu">☰</button>
                    <span class="page-title">Price Alerts</span>
                </div>
                <div class="topbar-right">
                    <button class="theme-toggle-btn btn btn-ghost" style="width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center" aria-label="Toggle theme"></button>
                </div>
            </header>

            <main class="page-content">
                <section class="alerts alerts-section">
                    <div class="page-header">
                        <div class="page-header-text">
                            <h1>🔔 Price Alerts</h1>
                            <p>Get notified when an asset crosses your target price threshold.</p>
                        </div>
                    </div>

                    <!-- Create Alert Form -->
                    <div class="alert-form-card panel">
                        <div class="panel-header">
                            <span class="panel-title">Create New Alert</span>
                        </div>
                        <div class="panel-body">
                            <div class="alert-form-row">
                                <div class="form-group">
                                    <label for="alertAsset">Asset Name</label>
                                  <div class="autocomplete-container">
                                    <input type="text" id="alertAsset" placeholder="e.g., AAPL, Tesla, BTC" autocomplete="off">
                                    <div id="alertAutocomplete" class="autocomplete-results"></div>
                                  </div>
                                </div>
                                <div class="form-group">
                                    <label for="alertCondition">Condition</label>
                                    <select id="alertCondition">
                                        <option value="above">📈 Rises Above</option>
                                        <option value="below">📉 Falls Below</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="alertPrice">Target Price ($)</label>
                                    <input type="number" id="alertPrice" placeholder="e.g., 150.00" step="0.01" min="0.01">
                                </div>
                                <div class="form-group" style="justify-content: flex-end;">
                                    <label style="visibility:hidden;">Create</label>
                                    <button id="createAlertBtn" class="btn-create-alert" onclick="createAlert()">
                                        + Create Alert
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Alerts List -->
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">
                                Your Alerts
                                <span id="alertCount" style="font-size:0.8rem; font-weight:400; color: var(--text-muted);"></span>
                            </span>
                        </div>
                        <div class="panel-body">
                            <div id="alertsList" class="alert-list">
                                <div class="no-alerts">Loading alerts...</div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
    <script src="js/api/apiClient.js"></script>
    <script src="js/api/authApi.js"></script>
    <script src="js/api/portfolioApi.js"></script>
    <script src="js/data-models.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script>
        // ── Sidebar mobile toggle ─────────────────────────
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('appSidebar');
        const backdrop = document.getElementById('sidebarBackdrop');

        menuBtn?.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            backdrop.classList.toggle('visible');
        });
        backdrop?.addEventListener('click', () => {
            sidebar.classList.remove('open');
            backdrop.classList.remove('visible');
        });

        document.addEventListener('DOMContentLoaded', () => {
            const user = window.AuthManager ? window.AuthManager.getCurrentUser() : null;
            if (user && user.username) {
                const nameEl = document.getElementById('sidebarUsername');
                if (nameEl) nameEl.textContent = user.username;
            }
            setupAutocomplete('alertAsset', 'alertAutocomplete', (item) => {
                document.getElementById('alertAsset').value = item.symbol;
            });
        });

        let searchTimeout;
        function setupAutocomplete(inputId, resultsId, onSelect) {
            const input = document.getElementById(inputId);
            const resultsContainer = document.getElementById(resultsId);

            input.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                const query = e.target.value.trim();
                
                if (query.length < 1) {
                    resultsContainer.innerHTML = '';
                    resultsContainer.classList.remove('active');
                    return;
                }

                searchTimeout = setTimeout(async () => {
                    try {
                        const token = localStorage.getItem('accessToken');
                        const res = await fetch(`/api/market/search?q=${encodeURIComponent(query)}`, { headers: { 'Authorization': `Bearer ${token}` } });
                        const data = await res.json();
                        const results = data.data || [];
                        
                        if (results.length === 0) {
                            resultsContainer.innerHTML = '<div class="autocomplete-item"><span class="autocomplete-name">No results found</span></div>';
                        } else {
                            resultsContainer.innerHTML = results.map(item => `
                                <div class="autocomplete-item" data-symbol="${item.symbol}" data-name="${item.name.replace(/"/g, '&quot;')}">
                                    <span class="autocomplete-symbol">${item.symbol}</span>
                                    <span class="autocomplete-name">${item.name} &middot; ${item.exchange}</span>
                                </div>
                            `).join('');
                            
                            resultsContainer.querySelectorAll('.autocomplete-item').forEach(el => {
                                if (el.hasAttribute('data-symbol')) {
                                    el.addEventListener('click', () => {
                                        onSelect({ symbol: el.dataset.symbol, name: el.dataset.name });
                                        resultsContainer.classList.remove('active');
                                    });
                                }
                            });
                        }
                        resultsContainer.classList.add('active');
                    } catch (err) {
                        console.error('Search error', err);
                    }
                }, 300);
            });

            document.addEventListener('click', (e) => {
                if (e.target !== input && !resultsContainer.contains(e.target)) {
                    resultsContainer.classList.remove('active');
                }
            });
        }

        let alertsData = [];

        async function loadAlerts() {
            try {
                const token = localStorage.getItem('accessToken');
                const res = await fetch('/api/alerts', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.success) {
                    alertsData = data.data;
                    renderAlerts();
                }
            } catch (err) {
                document.getElementById('alertsList').innerHTML = '<div class="no-alerts">Failed to load alerts.</div>';
            }
        }

        function renderAlerts() {
            const container = document.getElementById('alertsList');
            const countEl = document.getElementById('alertCount');
            countEl.textContent = `(${alertsData.length})`;

            if (alertsData.length === 0) {
                container.innerHTML = '<div class="no-alerts">No alerts yet. Create one above to get started. 🔔</div>';
                return;
            }

            container.innerHTML = alertsData.map(alert => {
                const status = alert.triggeredAt ? 'triggered' : (alert.isActive ? 'active' : 'paused');
                const statusLabel = alert.triggeredAt ? '✅ Triggered' : (alert.isActive ? '🟢 Active' : '⏸ Paused');
                const triggeredText = alert.triggeredAt
                    ? `<div class="triggered-at">Triggered: ${new Date(alert.triggeredAt).toLocaleString()}</div>` : '';
                return `
                <div class="alert-item">
                    <div class="alert-item-info">
                        <div class="alert-asset-name">${alert.assetName}</div>
                        <div class="alert-condition">
                            <span class="condition-badge ${alert.condition}">${alert.condition === 'above' ? '📈 Above' : '📉 Below'}</span>
                            $${Number(alert.targetPrice).toFixed(2)}
                        </div>
                        ${triggeredText}
                    </div>
                    <span class="alert-status-badge ${status}">${statusLabel}</span>
                    <div class="alert-actions">
                        ${!alert.triggeredAt ? `<button class="btn-toggle" onclick="toggleAlert(${alert.id})">${alert.isActive ? 'Pause' : 'Resume'}</button>` : ''}
                        <button class="btn-delete-alert" onclick="deleteAlert(${alert.id})">Delete</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function createAlert() {
            const assetName = document.getElementById('alertAsset').value.trim();
            const condition = document.getElementById('alertCondition').value;
            const targetPrice = parseFloat(document.getElementById('alertPrice').value);

            if (!assetName || isNaN(targetPrice) || targetPrice <= 0) {
                showNotification('Please fill in all fields correctly', 'error');
                return;
            }

            const btn = document.getElementById('createAlertBtn');
            btn.disabled = true; btn.textContent = 'Creating...';

            try {
                const token = localStorage.getItem('accessToken');
                const res = await fetch('/api/alerts', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ assetName, condition, targetPrice })
                });
                const data = await res.json();
                if (data.success) {
                    showNotification(data.message, 'success');
                    document.getElementById('alertAsset').value = '';
                    document.getElementById('alertPrice').value = '';
                    loadAlerts();
                } else {
                    showNotification(data.message || 'Failed to create alert', 'error');
                }
            } catch {
                showNotification('Network error', 'error');
            } finally {
                btn.disabled = false; btn.textContent = '+ Create Alert';
            }
        }

        async function toggleAlert(id) {
            try {
                const token = localStorage.getItem('accessToken');
                const res = await fetch(`/api/alerts/${id}/toggle`, {
                    method: 'PATCH', headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) { loadAlerts(); showNotification(data.message, 'success'); }
            } catch { showNotification('Failed to update alert', 'error'); }
        }

        async function deleteAlert(id) {
            if (!confirm('Delete this alert?')) return;
            try {
                const token = localStorage.getItem('accessToken');
                const res = await fetch(`/api/alerts/${id}`, {
                    method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) { loadAlerts(); showNotification('Alert deleted', 'success'); }
            } catch { showNotification('Failed to delete alert', 'error'); }
        }

        document.addEventListener('DOMContentLoaded', loadAlerts);
    </script>
    <script src="/js/keyboard.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    </script>
    <script src="/js/bg-pattern.js"></script>
</body>
</html>
