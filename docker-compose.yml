version: '3.9'

services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: quantvault_db
    environment:
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: pass1
      POSTGRES_DB: portfolio_management
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Application ────────────────────────────────────────────────────
  app:
    build: .
    container_name: quantvault_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://portfolio_user:pass1@db:5432/portfolio_management
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLIENT_URL: http://localhost:3002
      NODE_ENV: production
      PORT: 3002
    ports:
      - "3002:3002"
    command: >
      sh -c "npx prisma migrate deploy && node server.js"
    restart: unless-stopped

  # ── Adminer (DB GUI) ───────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: quantvault_adminer
    depends_on:
      - db
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
