<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - QuantVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/theme.js"></script>
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        .error-code {
            font-family: var(--font-display);
            font-size: 8rem;
            font-weight: 800;
            background: var(--grad-brand);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: var(--text-2xl);
            color: var(--text-primary);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="signup-page">
    <canvas id="bgCanvas"></canvas>
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <p class="error-message">Oops! This market doesn't exist.</p>
        <a href="/" class="btn btn-primary" style="text-decoration: none;">Return to Dashboard</a>
    </div>
    <script src="/js/bg-pattern.js"></script>
</body>
</html>
