<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#38BDF8" />
  <meta name="description" content="QuantVault Watchlist — Track assets before buying" />
  <title>QuantVault — Watchlist</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
    <canvas id="bgCanvas"></canvas>
  <div class="app-shell">
    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="appSidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-mark">QV</div>
        <span class="sidebar-logo-text">QuantVault</span>
    </div>

    <nav class="sidebar-nav" aria-label="Main navigation">
        <span class="sidebar-section-label">Platform</span>
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span> Home
        </a>
        <a href="portfolio.html" class="nav-item">
            <span class="nav-icon">💼</span> Portfolio
        </a>
        <a href="transactions.html" class="nav-item">
            <span class="nav-icon">💰</span> Transactions
        </a>
        <a href="reports.html" class="nav-item">
            <span class="nav-icon">📈</span> Reports
        </a>
        <a href="watchlist.html" class="nav-item active">
            <span class="nav-icon">👁️</span> Watchlist
        </a>
        <a href="alerts.html" class="nav-item">
            <span class="nav-icon">🔔</span> Alerts
        </a>

        <div class="sidebar-divider"></div>

        <span class="sidebar-section-label">Account</span>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span> Profile
        </a>
        <a href="#" class="nav-item" onclick="logout(); return false;">
            <span class="nav-icon">🚪</span> Logout
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="sidebar-user">
            <img src="https://api.dicebear.com/9.x/adventurer/svg?seed=Nova" alt="Avatar" class="sidebar-avatar" id="sidebarAvatar">
            <div class="sidebar-user-info">
                <div class="sidebar-username" id="sidebarUsername">Loading...</div>
                <div class="sidebar-user-role">Investor</div>
            </div>
        </div>
    </div>
</aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- ── MAIN AREA ── -->
    <div class="main-area">
      <header class="topbar">
        <div class="topbar-left">
          <button class="topbar-menu-btn" id="menuBtn" aria-label="Toggle menu">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="page-title">Watchlist</h1>
        </div>
        <div class="topbar-right">
          <div class="live-badge"><span class="live-dot"></span> LIVE</div>
          <button class="theme-toggle-btn btn btn-ghost" style="width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center" aria-label="Toggle theme"></button>
          
        </div>
      </header>

      <main class="page-content">

        <!-- Add to Watchlist Form -->
        <div class="glass-card mb-6">
          <h2 style="margin-bottom:var(--space-4);font-size:var(--text-xl)">➕ Add to Watchlist</h2>
          <form id="watchlistForm" onsubmit="addToWatchlist(event)">
            <div class="form-row" style="grid-template-columns:1fr 1fr 1fr auto;gap:var(--space-4);align-items:end">
              <div class="form-group">
                <label class="form-label">Symbol <span style="color:var(--rose)">*</span></label>
              <div class="autocomplete-container">
                <input type="text" id="wlSymbol" class="form-input" placeholder="e.g. NVDA" maxlength="30" required autocomplete="off" />
                <div id="wlAutocomplete" class="autocomplete-results"></div>
              </div>
              </div>
              <div class="form-group">
                <label class="form-label">Name <span style="color:var(--rose)">*</span></label>
                <input type="text" id="wlName" class="form-input" placeholder="e.g. NVIDIA Corporation" required />
              </div>
              <div class="form-group">
                <label class="form-label">Target Price (optional)</label>
                <input type="number" id="wlTarget" class="form-input" placeholder="e.g. 500.00" step="0.01" min="0" />
              </div>
              <button type="submit" class="btn btn-primary" id="wlAddBtn">Add</button>
            </div>
          </form>
        </div>

        <!-- Watchlist Table -->
        <div class="glass-card">
          <div class="section-header" style="margin-bottom:var(--space-4)">
            <h2 style="font-size:var(--text-xl)">👁️ Tracked Assets</h2>
            <span id="wlCount" class="badge badge-info">0 items</span>
          </div>
          <div id="watchlistContent">
            <div class="analytics-loading">Loading watchlist...</div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <div id="notification" role="alert"></div>

  <script src="/js/api/apiClient.js"></script>
  <script src="/js/api/authApi.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/keyboard.js"></script>
  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // Sidebar toggle
    document.getElementById('menuBtn')?.addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarBackdrop').classList.toggle('visible');
    });
    document.getElementById('sidebarBackdrop')?.addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarBackdrop').classList.remove('visible');
    });

    // Load user info
    document.addEventListener('DOMContentLoaded', () => {
      const user = AuthApi.getCurrentUser();
      if (user) {
        document.getElementById('sidebarUsername').textContent = user.username;
      }
      loadWatchlist();
      setupAutocomplete('wlSymbol', 'wlAutocomplete', (item) => {
        document.getElementById('wlSymbol').value = item.symbol;
        document.getElementById('wlName').value = item.name;
      });
    });

    let searchTimeout;
    function setupAutocomplete(inputId, resultsId, onSelect) {
      const input = document.getElementById(inputId);
      const resultsContainer = document.getElementById(resultsId);

      input.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const query = e.target.value.trim();
        
        if (query.length < 1) {
          resultsContainer.innerHTML = '';
          resultsContainer.classList.remove('active');
          return;
        }

        searchTimeout = setTimeout(async () => {
          try {
            const res = await apiClient.get(`/market/search?q=${encodeURIComponent(query)}`);
            const results = res.data.data || [];
            
            if (results.length === 0) {
              resultsContainer.innerHTML = '<div class="autocomplete-item"><span class="autocomplete-name">No results found</span></div>';
            } else {
              resultsContainer.innerHTML = results.map(item => `
                <div class="autocomplete-item" data-symbol="${item.symbol}" data-name="${item.name.replace(/"/g, '&quot;')}">
                  <span class="autocomplete-symbol">${item.symbol}</span>
                  <span class="autocomplete-name">${item.name} &middot; ${item.exchange}</span>
                </div>
              `).join('');
              
              resultsContainer.querySelectorAll('.autocomplete-item').forEach(el => {
                if (el.hasAttribute('data-symbol')) {
                  el.addEventListener('click', () => {
                    onSelect({ symbol: el.dataset.symbol, name: el.dataset.name });
                    resultsContainer.classList.remove('active');
                  });
                }
              });
            }
            resultsContainer.classList.add('active');
          } catch (err) {
            console.error('Search error', err);
          }
        }, 300);
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', (e) => {
        if (e.target !== input && !resultsContainer.contains(e.target)) {
          resultsContainer.classList.remove('active');
        }
      });
    }

    async function loadWatchlist() {
      try {
        const res = await apiClient.get('/watchlist');
        const items = res.data.data || [];
        renderWatchlist(items);
      } catch (e) {
        document.getElementById('watchlistContent').innerHTML = '<p style="color:var(--rose);text-align:center;padding:var(--space-8)">Failed to load watchlist.</p>';
      }
    }

    function renderWatchlist(items) {
      document.getElementById('wlCount').textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;
      if (items.length === 0) {
        document.getElementById('watchlistContent').innerHTML = `
          <div class="no-alerts" style="padding:var(--space-10)">
            <div style="font-size:2.5rem;margin-bottom:var(--space-3)">👁️</div>
            <p>Your watchlist is empty. Add assets you want to track!</p>
          </div>`;
        return;
      }

      const rows = items.map(item => {
        const hasTarget = item.targetPrice !== null;
        const isAboveTarget = hasTarget && item.currentPrice > item.targetPrice;
        const isBelowTarget = hasTarget && item.currentPrice < item.targetPrice;
        return `
          <div class="alert-item" id="wl-${item.id}">
            <div class="alert-item-info">
              <div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:4px">
                <span class="alert-asset-name">${item.symbol}</span>
                <span style="font-size:var(--text-xs);color:var(--text-muted)">${item.name}</span>
              </div>
              <div style="display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap">
                <span class="font-mono" style="font-size:var(--text-base);color:var(--cyan)">$${item.currentPrice.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})}</span>
                ${hasTarget ? `
                  <span class="condition-badge ${isAboveTarget ? 'above' : isBelowTarget ? 'below' : 'above'}" style="font-size:var(--text-xs)">
                    Target: $${item.targetPrice.toLocaleString('en-US', {minimumFractionDigits:2})} ${isAboveTarget ? '▲' : isBelowTarget ? '▼' : '✓'}
                  </span>` : ''}
                ${item.notes ? `<span style="font-size:var(--text-xs);color:var(--text-muted)">${item.notes}</span>` : ''}
              </div>
            </div>
            <div class="alert-actions">
              <button class="btn btn-danger btn-sm" onclick="removeFromWatchlist(${item.id})">Remove</button>
            </div>
          </div>`;
      });

      document.getElementById('watchlistContent').innerHTML = `<div class="alert-list">${rows.join('')}</div>`;
    }

    async function addToWatchlist(e) {
      e.preventDefault();
      const btn = document.getElementById('wlAddBtn');
      btn.disabled = true; btn.textContent = 'Adding...';
      try {
        const payload = {
          symbol: document.getElementById('wlSymbol').value.trim().toUpperCase(),
          name: document.getElementById('wlName').value.trim(),
          targetPrice: document.getElementById('wlTarget').value || null
        };
        await apiClient.post('/watchlist', payload);
        document.getElementById('watchlistForm').reset();
        await loadWatchlist();
        showNotification(`${payload.symbol} added to watchlist`, 'success');
      } catch (err) {
        showNotification(err.response?.data?.message || 'Failed to add item', 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Add';
      }
    }

    async function removeFromWatchlist(id) {
      if (!confirm('Remove this item from your watchlist?')) return;
      try {
        await apiClient.delete(`/watchlist/${id}`);
        await loadWatchlist();
        showNotification('Removed from watchlist', 'success');
      } catch (err) {
        showNotification('Failed to remove item', 'error');
      }
    }

    function showNotification(msg, type = 'info') {
      const el = document.getElementById('notification');
      el.textContent = msg;
      el.style.display = 'block';
      el.style.background = type === 'success' ? 'rgba(16,185,129,0.15)' : type === 'error' ? 'rgba(239,68,68,0.15)' : 'rgba(56,189,248,0.12)';
      el.style.color = type === 'success' ? '#34D399' : type === 'error' ? '#F87171' : '#38BDF8';
      el.style.border = `1px solid ${type === 'success' ? 'rgba(16,185,129,0.3)' : type === 'error' ? 'rgba(239,68,68,0.3)' : 'rgba(56,189,248,0.2)'}`;
      setTimeout(() => { el.style.display = 'none'; }, 3500);
    }
  </script>
    <script src="/js/bg-pattern.js"></script>
</body>
</html>
